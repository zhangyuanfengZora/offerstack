baseURL = "https://offerstack.dev/"
languageCode = "zh-cn"
title = "OfferStack"
theme = "hextra"

enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "Go · MySQL · Redis · 计算机基础 · AI专题 · 项目实战"
  images = []

  [params.theme]
    displayToggle = false

  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "images/logo.svg"
      dark = "images/logo-dark.svg"
      link = "/"
      width = 40
      height = 40

  [params.page]
    width = "normal"

  [params.footer]
    displayCopyright = false
    displayPoweredBy = false
    width = "normal"

copyright = "OfferStack"

  displayUpdatedDate = true
  dateFormat = "2006-01-02"

  [params.search]
    enable = false

  [params.highlight]
    copyNotation = "icon"
    [params.highlight.copy]
      enable = true

  [params.comments]
    enable = true
    type = "giscus"

    [params.comments.giscus]
      repo = "zhangyuanfengZora/offerstack"
      repoId = "R_kgDORzmp-Q"
      category = "General"
      categoryId = "DIC_kwDORzmp-c4C5g5V"
      mapping = "pathname"
      strict = "0"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "bottom"
      lang = "zh-CN"

# 顶部导航菜单
[[menu.main]]
  name = "Go 语言"
  pageRef = "/go"
  weight = 1

[[menu.main]]
  name = "MySQL"
  pageRef = "/mysql"
  weight = 2

[[menu.main]]
  name = "Redis"
  pageRef = "/redis"
  weight = 3

[[menu.main]]
  name = "计算机基础"
  pageRef = "/cs"
  weight = 4

[[menu.main]]
  name = "AI 专题"
  pageRef = "/ai"
  weight = 5

[[menu.main]]
  name = "项目实战"
  pageRef = "/project"
  weight = 6

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/zhangyuanfengZora/offerstack"
  weight = 7
  [menu.main.params]
    icon = "github"

[[menu.main]]
  name = "theme-toggle"
  weight = 8
  [menu.main.params]
    type = "theme-toggle"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
